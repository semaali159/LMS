version: "3.9"

services:
  api:
    build: .
    restart: unless-stopped
    ports:
    - "3002:3002"
    env_file:
    - .env
    depends_on:
      - redis
      - rabbitmq
    environment:
      DATABASE_HOST: ${DATABASE_URL}
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://rabbitmq:5672
      
  redis:
    image: redis:7
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: